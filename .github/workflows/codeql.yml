# CodeQL static analysis for the provider's Java sources.
# Results appear under the repository's "Security > Code scanning" tab.

name: CodeQL

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '41 4 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (java)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Install the java-client dependency BEFORE CodeQL init so the client's own
      # compilation is not traced/analyzed here (it has its own CodeQL workflow).
      - name: Install java-client dependency (submodule)
        run: mvn -B -DskipTests install --file java-client/pom.xml

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: java-kotlin
          build-mode: manual

      # Manual build so CodeQL traces the provider's compilation. Skip tests for speed.
      - name: Build provider
        run: mvn -B -DskipTests package --file pom.xml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:java-kotlin"
