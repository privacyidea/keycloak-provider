# Build the provider and run its tests. The privacyidea-java-client dependency is
# not on a public repository, so the java-client submodule is built and installed
# first (which also runs the client's own test suite in this repo).

name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # LTS JVMs Keycloak runs on.
        java-version: [ '17', '21' ]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      # Build, test and install the java-client into the local repo so the provider can resolve it.
      - name: Build and test java-client (submodule)
        run: mvn -B install --file java-client/pom.xml

      - name: Build and test the provider
        run: mvn -B verify --file pom.xml
